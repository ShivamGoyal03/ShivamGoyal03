name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ensures the action can push files back to your repo
    steps:
      - uses: actions/checkout@v4

      - name: Create stats directory
        run: mkdir -p stats

      - name: Generate GitHub Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats # <--- This fixes the "Input required: card" error
          options: username=ShivamGoyal03&hide=issues,prs&count_private=true&show_owner=true&show_icons=true&theme=radical
          path: stats/main.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: langs
          options: username=ShivamGoyal03&theme=radical&langs_count=8&layout=compact
          path: stats/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Streak Card
        run: |
          curl "https://github-readme-streak-stats.herokuapp.com/?user=ShivamGoyal03&theme=radical" > stats/streak.svg

      - name: Commit and Push
        run: |
          git config user.name "ShivamGoyal03"
          git config user.email "93383164+ShivamGoyal03@users.noreply.github.com"
          git add stats/*.svg
          git commit -m "Update GitHub stats cards" || exit 0
          git push
